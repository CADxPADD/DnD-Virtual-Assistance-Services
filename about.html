<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | DnD Virtual Assistance</title>
    <style>
        :root { --primary: #00bcd4; --bg: #ffffff; --text: #1a1a1a; --sub: #6c757d; --border: #e9ecef; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 40px; }
        .header-nav { padding: 40px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { width: 140px; }
        nav a { text-decoration: none; color: var(--sub); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-left: 30px; }
        .highlight { color: var(--primary); }
        .stat-item { margin-bottom: 40px; }
        .stat-header { display: flex; align-items: baseline; color: var(--primary); font-weight: 800; }
        .counter { font-size: 2.5rem; margin: 0; }
        .symbol { font-size: 1.8rem; }
        .label { font-size: 0.75rem; text-transform: uppercase; color: var(--sub); display: block; }
        footer { padding: 80px 0; text-align: center; font-size: 0.65rem; color: #adb5bd; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-nav">
            <a href="index.html"><img src="logo.png" alt="DnD Media" class="logo"></a>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
            </nav>
        </header>
        <section>
            <h1>We build the <span class="highlight">infrastructure</span> behind brands.</h1>
            <div class="stat-item">
                <div class="stat-header">
                    <h2 class="counter" data-target="24">0</h2>
                    <span class="symbol">/</span>
                    <h2 class="counter" data-target="7">0</h2>
                </div>
                <span class="label">Operational Support</span>
            </div>
        </section>
    </div>
    <footer>© 2026 DND MEDIA. ALL RIGHTS RESERVED.</footer>
    <script>
        const counters = document.querySelectorAll('.counter');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const updateCount = (el) => {
                        const target = +el.getAttribute('data-target');
                        const count = +el.innerText;
                        if (count < target) {
                            el.innerText = count + 1;
                            setTimeout(() => updateCount(el), 50);
                        }
                    };
                    updateCount(entry.target);
                }
            });
        }, { threshold: 0.5 });
        counters.forEach(c => observer.observe(c));
    </script>
</body>
</html>
